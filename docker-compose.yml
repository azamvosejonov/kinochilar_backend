services:
  db:
    image: postgres:15-alpine
    container_name: kinochilar_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-kinochilar}
    ports:
      - "5439:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: kinochilar_redis
    ports:
      - "6385:6379"

  api:
    build: .
    container_name: kinochilar_api
    ports:
      - "8085:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@db/${POSTGRES_DB:-kinochilar}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis
    volumes:
      - uploads_data:/app/uploads

  nginx:
    image: nginx:alpine
    container_name: kinochilar_nginx
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_cache:/var/cache/nginx
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
    restart: always

volumes:
  postgres_data:
  nginx_cache:
  nginx_logs:
  uploads_data:
