# Kinochilar Backend - Nginx Configuration
# Professional nginx setup for high-performance video streaming API

# Upstream configuration for load balancing
upstream kinochilar_backend {
    # FastAPI backend server
    server kinochilar_api:8000;
    
    # Load balancing method (least_conn for video streaming)
    least_conn;
    
    # Keepalive connections
    keepalive 32;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Cache configuration for static content
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=kinochilar_cache:100m max_size=1g inactive=60m use_temp_path=off;

# Main server block
server {
    listen 80;
    listen [::]:80;
    server_name kinochilar.localhost localhost;
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    
    # Remove nginx version
    server_tokens off;
    
    # Client body size limit (for large video uploads)
    client_max_body_size 100M;
    
    # Timeouts
    client_body_timeout 60s;
    client_header_timeout 60s;
    keepalive_timeout 65s;
    send_timeout 60s;
    
    # Logging
    access_log /var/log/nginx/kinochilar_access.log;
    error_log /var/log/nginx/kinochilar_error.log warn;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;
    
    # Root endpoint
    location / {
        proxy_pass http://kinochilar_backend;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Rate limiting
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 10;
    }
    
    # API endpoints with specific rate limiting
    location /api/v1/auth/ {
        proxy_pass http://kinochilar_backend;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Stricter rate limiting for auth endpoints
        limit_req zone=auth_limit burst=5 nodelay;
        limit_conn conn_limit 5;
    }
    
    # Video streaming endpoint - special configuration for range requests
    location /api/v1/stream/ {
        proxy_pass http://kinochilar_backend;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Important for video streaming
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_set_header Connection '';
        
        # Larger timeouts for video streaming
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # Disable rate limiting for streaming
        # limit_req zone=api_limit burst=50 nodelay;
    }
    
    # Static files caching (if you have static assets)
    location /static/ {
        alias /var/www/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        
        # CORS for static assets
        add_header Access-Control-Allow-Origin *;
    }
    
    # Media files caching (posters, backdrops)
    location /media/ {
        alias /var/www/media/;
        expires 90d;
        add_header Cache-Control "public, immutable";
        
        # CORS for media assets
        add_header Access-Control-Allow-Origin *;
        
        # Enable proxy cache for media files
        proxy_cache kinochilar_cache;
        proxy_cache_valid 200 90d;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        add_header X-Cache-Status $upstream_cache_status;
    }
    
    # Uploaded files (videos, posters, backdrops)
    location /uploads/ {
        proxy_pass http://kinochilar_backend;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Add CORS headers
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        add_header Access-Control-Allow-Headers "Range";
        
        # Cache for uploaded files
        proxy_cache kinochilar_cache;
        proxy_cache_valid 200 30d;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        add_header X-Cache-Status $upstream_cache_status;
        
        # Video streaming support
        proxy_buffering off;
        proxy_request_buffering off;
        
        # Larger timeouts for large files
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
    
    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # Nginx status (for monitoring)
    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        allow 172.16.0.0/12;
        allow 10.0.0.0/8;
        deny all;
    }
    
    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

